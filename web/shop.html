<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meesho</title>
<link href="https://fonts.googleapis.com/css2?family=Mier+B:wght@400;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --m:#9F2089; --m-dark:#83176F; --green:#038D63; --gold:#E7A500; --ink:#333; --line:#eee; }
  * { box-sizing:border-box; margin:0; font-family:'Manrope',system-ui,sans-serif; }
  html, body { overflow-x:hidden; scrollbar-width:none; }
  html::-webkit-scrollbar, body::-webkit-scrollbar { display:none; }
  body { background:#fff; color:var(--ink); margin:0 auto; padding-bottom:60px; }

  .m-header { background:var(--m); padding:10px 12px 12px; position:sticky; top:0; z-index:20; }
  .m-top { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .m-logo { width:34px; height:34px; background:#fff; color:var(--m); border-radius:50%;
            display:grid; place-items:center; font-weight:800; font-size:19px; }
  .m-discount { background:var(--m-dark); color:#fff; font-size:12px; font-weight:700;
                padding:6px 11px; border-radius:999px; display:flex; align-items:center; gap:6px;
                white-space:nowrap; }
  .m-discount .coin { width:16px; height:16px; border-radius:50%; background:#F8CB46; color:#7a5a00;
                      display:grid; place-items:center; font-size:10px; font-weight:800; }
  .m-icons { margin-left:auto; display:flex; gap:14px; color:#fff; align-items:center; }
  .cart { position:relative; }
  .cart .n { position:absolute; top:-6px; right:-8px; background:#fff; color:var(--m); font-size:10px;
             font-weight:800; border-radius:50%; width:16px; height:16px; display:grid; place-items:center; }
  .m-search { background:#fff; border-radius:8px; display:flex; align-items:center; gap:9px;
              padding:10px 12px; color:#888; font-size:13.5px; font-weight:600; white-space:nowrap; }
  .m-search .cam { margin-left:auto; display:flex; gap:12px; color:#666; }

  .benefits { display:flex; border-bottom:6px solid #f4f4f6; }
  .benefits div { flex:1; display:flex; align-items:center; justify-content:center; gap:7px;
                  padding:10px 4px; font-size:11.5px; font-weight:700; color:#555;
                  border-right:1px solid var(--line); text-align:left; line-height:1.25; }
  .benefits div:last-child { border-right:none; }
  .benefits svg { flex:none; color:#777; }

  .cats { display:flex; gap:16px; padding:12px 14px 10px; overflow-x:auto; scrollbar-width:none; }
  .cats::-webkit-scrollbar { display:none; }
  .cat { flex:none; width:64px; text-align:center; font-size:11px; font-weight:600; color:#444; }
  .cat .ring { width:58px; height:58px; border-radius:50%; margin:0 auto 5px; overflow:hidden;
               border:1.5px solid var(--line); background:#faf7fa; display:grid; place-items:center; }
  .cat img { width:100%; height:100%; object-fit:cover; }
  .cat.active .ring { border-color:var(--m); }
  .cat.active { color:var(--m); font-weight:700; }
  .scrollhint { height:3px; width:110px; background:#e9e2ea; margin:0 auto 8px; border-radius:2px; position:relative; }
  .scrollhint::after { content:''; position:absolute; left:0; top:0; height:100%; width:42px; background:var(--m); border-radius:2px; }

  .mela { margin:4px 12px 12px; border-radius:12px; position:relative; overflow:hidden;
          color:#fff; min-height:104px; display:flex; align-items:center; }
  .mela .art { position:absolute; inset:0 0 0 auto; width:58%; object-fit:cover; }
  .mela .wash { position:absolute; inset:0;
                background:linear-gradient(95deg, #C2148F 0%, #C2148F 42%, rgba(194,20,143,.72) 62%, rgba(131,23,111,.28) 100%); }
  .mela .txt { position:relative; padding:14px 16px; max-width:62%; }
  .mela b { font-size:16px; letter-spacing:.03em; display:block; line-height:1.25; }
  .mela small { font-size:11.5px; opacity:.9; font-weight:600; }
  .mela .date { position:absolute; right:12px; top:50%; transform:translateY(-50%);
                background:#fff; color:var(--m); font-weight:800; font-size:12.5px; border-radius:8px;
                padding:7px 10px; text-align:center; line-height:1.2; }

  .filterbar { display:flex; border-top:1px solid var(--line); border-bottom:1px solid var(--line);
               position:sticky; top:112px; background:#fff; z-index:15; }
  .filterbar div { flex:1; display:flex; align-items:center; justify-content:center; gap:6px;
                   padding:11px 4px; font-size:13px; font-weight:700; color:#444;
                   border-right:1px solid var(--line); }
  .filterbar div:last-child { border-right:none; }

  .grid { display:grid; grid-template-columns:1fr 1fr; }
  .pcard { border-right:1px solid var(--line); border-bottom:1px solid var(--line); background:#fff;
           padding-bottom:12px; position:relative; cursor:pointer; }
  .pimg { position:relative; }
  .pimg img { width:100%; aspect-ratio:0.9; object-fit:cover; display:block; background:#f6f2ee; }
  .heart { position:absolute; top:8px; right:8px; width:30px; height:30px; background:#fff;
           border-radius:50%; display:grid; place-items:center; color:#999; box-shadow:0 1px 4px rgba(0,0,0,.15); }
  .va-chip { position:absolute; top:8px; left:8px; background:var(--m); color:#fff; font-size:10.5px;
             font-weight:700; padding:4px 9px; border-radius:999px; display:flex; align-items:center; gap:4px; }
  .pbody { padding:9px 10px 0; }
  .ptitle { font-size:13.5px; font-weight:600; color:#555; line-height:1.3; display:-webkit-box;
            -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:35px; }
  .prow { display:flex; align-items:baseline; gap:7px; margin:6px 0 4px; }
  .prow .pr { font-size:17px; font-weight:800; color:#222; }
  .prow s { color:#999; font-size:12.5px; font-weight:600; }
  .prow .off { color:var(--green); font-size:12.5px; font-weight:700; }
  .dchip { display:inline-flex; align-items:center; gap:5px; background:#E7F6EF; color:var(--green);
           font-size:11px; font-weight:700; padding:3px 8px; border-radius:6px; margin-bottom:4px; }
  .offer { color:var(--green); font-size:12.5px; font-weight:700; margin-bottom:5px; }
  .rating { display:inline-flex; align-items:center; gap:4px; }
  .rating .pill { background:var(--green); color:#fff; font-size:11.5px; font-weight:700;
                  border-radius:10px; padding:2.5px 7px; display:inline-flex; gap:3px; align-items:center; }
  .rating .cnt { color:#888; font-size:12px; font-weight:600; }
  .toprated { display:flex; align-items:center; gap:4px; color:var(--gold); font-size:11.5px;
              font-weight:700; margin-top:4px; }

  .bottomnav { position:fixed; bottom:0; left:0; width:100%;
               background:#fff; border-top:1px solid var(--line); display:flex; z-index:30; }
  .bottomnav a { flex:1; text-align:center; padding:8px 0 9px; font-size:10.5px; font-weight:700;
                 color:#777; text-decoration:none; }
  .bottomnav a.active { color:var(--m); }
  .bottomnav svg { display:block; margin:0 auto 3px; }

  /* product sheet + orders */
  .sheet-bg { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:40; display:none; }
  .sheet { position:fixed; bottom:0; left:0; transform:translateY(105%); width:100%;
           background:#fff; border-radius:18px 18px 0 0; z-index:41; transition:transform .25s;
           max-height:82vh; overflow-y:auto; scrollbar-width:none; }
  .sheet::-webkit-scrollbar { display:none; }
  .sheet.open { transform:translateY(0); }
  .sheet img.main { width:100%; aspect-ratio:1.1; object-fit:cover; border-radius:18px 18px 0 0; }
  .sheet .in { padding:16px; }
  .sheet h3 { font-size:17px; font-weight:800; color:#222; margin-bottom:6px; }
  .sheet .desc { font-size:13.5px; color:#666; line-height:1.55; margin:8px 0 14px; font-weight:500; }
  .buy { width:100%; background:var(--m); color:#fff; border:none; border-radius:10px; padding:14px;
         font-size:15.5px; font-weight:800; cursor:pointer; font-family:inherit; }
  .buy:disabled { background:#cfc3cd; }
  .orders { padding:14px; display:none; flex-direction:column; gap:12px; }
  .ocard { border:1px solid var(--line); border-radius:12px; padding:12px; display:flex; gap:12px; align-items:center; }
  .ocard img { width:60px; height:60px; border-radius:8px; object-fit:cover; background:#f4f0ec; }
  .ocard .t { font-size:13.5px; font-weight:700; flex:1; }
  .ocard .st { font-size:12px; font-weight:700; margin-top:3px; }
  .st.placed { color:var(--green); } .st.returned { color:#c0392b; }
  .ret { background:#fff; border:1.5px solid #c0392b; color:#c0392b; border-radius:8px; padding:7px 12px;
         cursor:pointer; font-size:12.5px; font-weight:700; font-family:inherit; }
  select.reason { padding:7px; border-radius:8px; border:1px solid #ddd; font-size:11.5px; max-width:150px; font-family:inherit; }
  .toast { position:fixed; bottom:74px; left:50%; transform:translateX(-50%); background:#222; color:#fff;
           padding:10px 18px; border-radius:20px; font-size:13px; opacity:0; transition:opacity .3s;
           pointer-events:none; z-index:50; max-width:90%; text-align:center; }
  .toast.show { opacity:1; }
  .empty { text-align:center; color:#888; padding:44px 20px; font-size:13.5px; font-weight:600; line-height:1.7; }
</style>
</head>
<body>

<div class="m-header">
  <div class="m-top">
    <div class="m-logo">m</div>
    <div class="m-discount"><span class="coin">₹</span> Discount upto ₹120</div>
    <div class="m-icons">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1 1.1L12 21l7.8-7.5 1-1.1a5.5 5.5 0 0 0 0-7.8Z"/></svg>
      <span class="cart"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 7h12l1 13H5L6 7ZM9 7a3 3 0 0 1 6 0"/></svg><span class="n">3</span></span>
    </div>
  </div>
  <div class="m-search">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
    Search by Keyword or Product ID
    <span class="cam">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M6 10a6 6 0 0 0 12 0M12 16v4"/></svg>
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 8h3l2-3h6l2 3h3v11H4z"/><circle cx="12" cy="13" r="3.5"/></svg>
    </span>
  </div>
</div>

<div id="tab-shop">
  <div class="benefits">
    <div><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5"/></svg>7 Days Easy Return</div>
    <div><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9.5 9.5h4a1.5 1.5 0 0 1 0 3h-3a1.5 1.5 0 0 0 0 3h4M12 6.5v2M12 15.5v2"/></svg>Cash on Delivery</div>
    <div><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12 12 4H6v6l8 8 6-6Z"/><circle cx="9" cy="7.5" r="1"/></svg>Lowest Price</div>
  </div>

  <div class="cats">
    <div class="cat active"><div class="ring" style="display:grid;place-items:center;color:var(--m)">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="7" height="7" rx="1.5"/><rect x="13" y="4" width="7" height="7" rx="1.5"/><rect x="4" y="13" width="7" height="7" rx="1.5"/><rect x="13" y="13" width="7" height="7" rx="1.5"/></svg>
    </div>All Catego...</div>
    <div class="cat"><div class="ring"><img src="/assets/p_madhubani.jpg" alt=""></div>Handmade</div>
    <div class="cat"><div class="ring"><img src="/assets/p_pattachitra.jpg" alt=""></div>Paintings</div>
    <div class="cat"><div class="ring"><img src="/assets/p_toys.jpg" alt=""></div>Toys</div>
    <div class="cat"><div class="ring"><img src="/assets/p_bluepottery.jpg" alt=""></div>Pottery</div>
    <div class="cat"><div class="ring"><img src="/assets/p_bandhani.jpg" alt=""></div>Sarees</div>
  </div>
  <div class="scrollhint"></div>

  <div class="mela">
    <img class="art" src="/assets/p_pattachitra.jpg" alt="">
    <span class="wash"></span>
    <div class="txt"><b>KARIGAR CRAFT MELA</b><small>GI-verified handmade · upto 70% off</small></div>
    <div class="date">JULY<br>17–20</div>
  </div>

  <div class="filterbar">
    <div><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 4v16m0 0-3-3m3 3 3-3M17 20V4m0 0-3 3m3-3 3 3"/></svg>Sort</div>
    <div>Category <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg></div>
    <div>Gender <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg></div>
    <div><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M7 12h10M10 18h4"/></svg>Filters</div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<div class="orders" id="orders"></div>

<nav class="bottomnav">
  <a href="#" class="active" onclick="showTab('shop');return false" id="nav-home">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 11 9-8 9 8v9a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1v-9Z"/></svg>Home</a>
  <a href="#" onclick="return false"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5h6l2 3h8v11H4V5Z"/></svg>Categories</a>
  <a href="#" onclick="return false"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 8h14l-1 12H6L5 8ZM9 8a3 3 0 0 1 6 0"/></svg>Mall</a>
  <a href="#" onclick="return false"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="m10 8.5 5 3.5-5 3.5v-7Z"/></svg>Video Finds</a>
  <a href="#" onclick="showTab('orders');return false" id="nav-orders">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8 12 3 3 8v8l9 5 9-5V8ZM3.5 8.5 12 13l8.5-4.5M12 13v8"/></svg>My Orders</a>
</nav>

<div class="sheet-bg" id="sheet-bg" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>
<div class="toast" id="toast"></div>

<script>
function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3400); }

// 10 seeded marketplace items — dressing that exists BEFORE any artisan lists.
const STATIC = [
 {img:'/assets/p_toys.jpg', title:'Channapatna Wooden Toy Set (Pack of 3)', price:199, mrp:599, off:67, special:179, rate:'4.4', cnt:'1,205', va:true, top:true},
 {img:'/assets/p_cleaner.jpg', title:'Multipurpose Kitchen Cleaner Spray 300ml', price:37, mrp:106, off:65, special:17, rate:'3.8', cnt:'60,594', imgrev:true},
 {img:'/assets/p_pattachitra.jpg', title:'Pattachitra Peacock Handmade Cloth Painting', price:249, mrp:899, off:72, special:219, rate:'4.7', cnt:'876', va:true, top:true},
 {img:'/assets/p_moneyplant.jpg', title:'Money Plant Vine for Wall Decor', price:59, mrp:162, off:64, special:42, rate:'4.3', cnt:'3,792'},
 {img:'/assets/p_madhubani.jpg', title:'Madhubani Elephant Handpainted Wall Art', price:299, mrp:450, off:33, special:269, rate:'4.6', cnt:'2,341', va:true, top:true},
 {img:'/assets/p_clock.jpg', title:'Vintage Wooden Wall Clock for Living Room', price:299, mrp:799, off:63, special:275, rate:'4.1', cnt:'12,041'},
 {img:'/assets/p_bluepottery.jpg', title:'Jaipur Blue Pottery Ceramic Flower Vase', price:349, mrp:999, off:65, special:319, rate:'4.5', cnt:'432', va:true},
 {img:'/assets/p_bottle.jpg', title:'Stainless Steel Water Bottle 1 Litre', price:129, mrp:399, off:68, special:115, rate:'4.6', cnt:'2,341', top:true},
 {img:'/assets/p_bandhani.jpg', title:'Bandhani Tie-Dye Cotton Dupatta Multicolor', price:229, mrp:649, off:65, special:205, rate:'4.2', cnt:'3,118', va:true},
 {img:'/assets/p_cushions.jpg', title:'Printed Cushion Covers Set of 5 (16x16)', price:149, mrp:499, off:70, special:132, rate:'4.0', cnt:'8,554'},
];

let myOrders = JSON.parse(localStorage.getItem('karigar_orders')||'[]');
function saveOrders(){ localStorage.setItem('karigar_orders', JSON.stringify(myOrders)); renderOrders(); }

function showTab(w){
  document.getElementById('tab-shop').style.display = w==='shop'?'block':'none';
  document.getElementById('orders').style.display = w==='orders'?'flex':'none';
  document.getElementById('nav-home').classList.toggle('active', w==='shop');
  document.getElementById('nav-orders').classList.toggle('active', w==='orders');
  if(w==='orders') renderOrders();
}

function vaChip(){ return `<span class="va-chip"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2"><path d="m5 13 4 4 10-11"/></svg>Verified Artisan</span>`; }
function heart(){ return `<span class="heart"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1 1.1L12 21l7.8-7.5 1-1.1a5.5 5.5 0 0 0 0-7.8Z"/></svg></span>`; }

function card(p, live){
  const div = document.createElement('div'); div.className='pcard';
  div.innerHTML = `
    <div class="pimg"><img src="${p.img}" loading="lazy" alt="">${p.va?vaChip():''}${heart()}</div>
    <div class="pbody">
      <div class="ptitle">${esc(p.title)}</div>
      <div class="prow"><span class="pr">₹${p.price}</span><s>₹${p.mrp}</s><span class="off">${p.off}% off</span></div>
      <div class="dchip"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><circle cx="12" cy="12" r="10"/><path d="m8.5 12.5 2.5 2.5 4.5-5.5"/></svg>Discount applied</div>
      <div class="offer">₹${p.special} with 1 Special Offer</div>
      <div class="rating"><span class="pill">${p.rate} <svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor"><path d="m12 2 2.9 6.5 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.8 1.6-7L2 9.1l7.1-.6L12 2Z"/></svg></span><span class="cnt">(${p.cnt})</span></div>
      ${p.top?'<div class="toprated"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="m12 2 2.9 6.5 7.1.6-5.4 4.7 1.6 7L12 17l-6.2 3.8 1.6-7L2 9.1l7.1-.6L12 2Z"/></svg>Top rated</div>':''}
      ${p.imgrev?'<div class="toprated">🖐️ 50+ image rev...</div>':''}
    </div>`;
  if(live) div.onclick = () => openSheet(live);
  else div.onclick = () => toast('Demo catalogue item — artisan listings are the tappable ones');
  return div;
}

function openSheet(l){
  const sheet = document.getElementById('sheet');
  const img = l.enhanced_photo_url || (l.photo_urls&&l.photo_urls[0]) || '';
  const who = l.artisans ? `by ${esc(l.artisans.name||'artisan')}, ${esc(l.artisans.village||'')}` : '';
  const off = l.original_price?Math.round((1-l.price/l.original_price)*100):0;
  sheet.innerHTML = `
    <img class="main" src="${img}">
    <div class="in">
      ${l.gi_status==='verified'?vaChip().replace('class="va-chip"','class="va-chip" style="position:static;display:inline-flex;margin-bottom:8px"'):''}
      <h3>${esc(l.title)}</h3>
      <div class="prow"><span class="pr" style="font-size:21px">₹${l.price}</span><s>₹${l.original_price}</s><span class="off">${off}% off</span></div>
      <div class="desc">${esc(l.description)}</div>
      <div class="offer">🧑‍🎨 ${who}</div>
      <button class="buy" id="buy-btn">Buy Now · Cash on Delivery</button>
    </div>`;
  document.getElementById('buy-btn').onclick = () => buy(l);
  sheet.classList.add('open');
  document.getElementById('sheet-bg').style.display='block';
}
function closeSheet(){
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('sheet-bg').style.display='none';
}

async function buy(l){
  const btn = document.getElementById('buy-btn');
  btn.disabled = true; btn.textContent = 'Placing order…';
  const fd = new FormData(); fd.append('listing_id', l.id);
  const r = await fetch('/demo/buy', {method:'POST', body:fd});
  if(!r.ok){ const e=await r.json(); toast(e.error||'failed'); btn.disabled=false; btn.textContent='Buy Now · Cash on Delivery'; return; }
  const data = await r.json();
  myOrders.unshift({order_id:data.order_id, title:l.title, img:l.enhanced_photo_url||(l.photo_urls&&l.photo_urls[0])||'', status:'placed'});
  saveOrders(); closeSheet();
  toast('📦 Order placed — the artisan just got a voice note on WhatsApp');
}

const REASONS = [
  ['Customer not at home', 'ग्राहक घर पर नहीं था'],
  ['Colours lighter than photos', 'रंग फोटो से थोड़े हल्के थे'],
  ['Smaller than expected', 'साइज़ उम्मीद से छोटा निकला'],
  ['Ordered by mistake', 'गलती से ऑर्डर हो गया था'],
];
async function returnOrder(o, sel, btn){
  btn.disabled = true; btn.textContent = '…';
  const fd = new FormData(); fd.append('order_id', o.order_id); fd.append('reason', sel.value);
  const r = await fetch('/demo/return-order', {method:'POST', body:fd});
  if(!r.ok){ const e=await r.json(); toast(e.error||'failed'); btn.disabled=false; btn.textContent='Return'; return; }
  const d = await r.json();
  o.status='returned'; saveOrders();
  toast(`↩️ Return classified "${d.classification}" — de-escalation voice note sent`);
}
function renderOrders(){
  const el = document.getElementById('orders');
  if(!myOrders.length){ el.innerHTML='<div class="empty">No orders yet.<br>Buy an artisan\'s listing from Home — then return it from here.</div>'; return; }
  el.innerHTML='';
  myOrders.forEach(o=>{
    const d = document.createElement('div'); d.className='ocard';
    d.innerHTML = `<img src="${o.img}"><div class="t">${esc(o.title)}
        <div class="st ${o.status}">${o.status==='placed'?'✅ Placed · artisan notified':'↩️ Returned'}</div></div>`;
    if(o.status==='placed'){
      const sel=document.createElement('select'); sel.className='reason';
      REASONS.forEach(([l,v])=>{const op=document.createElement('option'); op.textContent=l; op.value=v; sel.appendChild(op);});
      const b=document.createElement('button'); b.className='ret'; b.textContent='Return';
      b.onclick=()=>returnOrder(o, sel, b);
      d.appendChild(sel); d.appendChild(b);
    }
    el.appendChild(d);
  });
}

let liveIds = null;  // null = never rendered; '' = rendered with zero live listings
async function load(){
  try{
    const r = await fetch('/api/listings'); const data = await r.json();
    const ids = data.listings.map(l=>l.id).join(',');
    if(ids === liveIds) return;  // no change
    liveIds = ids;
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    // live artisan listings appear at the TOP of the marketplace grid
    data.listings.forEach(l=>{
      const off = l.original_price?Math.round((1-l.price/l.original_price)*100):0;
      grid.appendChild(card({img:l.enhanced_photo_url||(l.photo_urls&&l.photo_urls[0])||'',
        title:l.title, price:l.price, mrp:l.original_price||l.price, off,
        special:Math.max(l.price-30,1), rate:'New', cnt:'Just listed', va:true}, l));
    });
    STATIC.forEach(p=>grid.appendChild(card(p)));
  }catch(e){}
}
load(); setInterval(load, 5000);
</script>
