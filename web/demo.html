<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Karigar · Live Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --bg:#F5F2EC; --ink:#1C161D; --muted:#6B6470; --pink:#C2148F; --line:#E7E1D8; }
  * { box-sizing:border-box; margin:0; font-family:'Manrope',system-ui,sans-serif; }
  body { background:var(--bg); color:var(--ink); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
  a { text-decoration:none; color:inherit; }

  .topbar { background:#fff; border-bottom:1px solid var(--line); padding:6px 18px;
            display:flex; align-items:center; gap:12px; flex:none; }
  .topbar .home { display:flex; align-items:center; gap:6px; font-weight:700; color:#4a434f; font-size:13.5px; }
  .topbar .sep { color:#cfc8be; }
  .topbar .title { font-weight:800; font-size:14px; }
  .topbar .title span { color:var(--muted); font-weight:600; }
  .top-actions { margin-left:auto; display:flex; gap:8px; }
  .pill { border-radius:999px; padding:8px 16px; font-weight:800; font-size:13px; cursor:pointer;
          border:none; font-family:inherit; display:inline-flex; align-items:center; gap:6px; }
  .pill.pink { background:var(--pink); color:#fff; }
  .pill.ghost { background:#fff; color:var(--ink); border:1.5px solid var(--line); }

  .stage { flex:1; display:grid; grid-template-columns:1fr auto 1fr; align-items:center;
           padding:10px 20px 4px; min-height:0; }
  .phones { grid-column:2; display:flex; gap:40px; justify-content:center; height:100%; min-height:0; }
  .railcell { grid-column:3; display:flex; justify-content:center; padding-left:18px; }

  .phone-wrap { display:flex; flex-direction:column; align-items:center; gap:9px; height:100%; min-height:0; }
  .phone { flex:1; min-height:0; aspect-ratio:0.52; background:#0c0c0c; border-radius:34px;
           padding:5px; box-shadow:0 20px 50px rgba(28,22,29,.26); display:flex;
           flex-direction:column; position:relative; }
  .phone .notch { position:absolute; top:5px; left:50%; transform:translateX(-50%); width:30%;
                  height:13px; background:#0c0c0c; border-radius:0 0 10px 10px; z-index:5; }
  .screen { flex:1; min-height:0; border-radius:29px; overflow:hidden; background:#fff;
            display:flex; flex-direction:column; }
  .caption { flex:none; }
  .statusbar { flex:none; display:flex; justify-content:space-between; align-items:center;
               font-size:11px; font-weight:700; padding:5px 16px 3px; }
  .statusbar.wa { background:#075E54; color:#fff; }
  /* keep in sync with console.html --teal */
  .statusbar.ms { background:#9F2089; color:#fff; }
  .statusbar .right { display:flex; gap:6px; align-items:center; }
  .batt { width:20px; height:10px; border:1.5px solid currentColor; border-radius:3px; position:relative; }
  .batt::after { content:''; position:absolute; inset:1.5px; right:35%; background:currentColor; border-radius:1px; }
  iframe { flex:1; border:none; width:100%; }
  .caption { font-size:12.5px; font-weight:700; color:#4a434f; }
  .caption span { color:var(--muted); font-weight:600; }

  .rail { width:290px; flex:none; display:flex; flex-direction:column; gap:12px; align-self:center; }
  .step-btn { display:flex; align-items:center; gap:12px; background:#fff; border:1.5px solid var(--line);
              border-radius:999px; padding:14px 20px; font-weight:800; font-size:14.5px; cursor:pointer;
              font-family:inherit; color:var(--ink); text-align:left; transition:all .12s; }
  .step-btn:hover { border-color:var(--pink); }
  .step-btn.primary { background:var(--pink); border-color:var(--pink); color:#fff; }
  .step-btn .n { opacity:.65; font-weight:700; }
  .rail .minor { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
  .minor button { flex:1 1 46%; background:transparent; border:1.5px dashed #cfc8be; border-radius:10px;
                  padding:8px 6px; font-size:11.5px; font-weight:700; color:#6B6470; cursor:pointer; font-family:inherit; }
  .minor button:hover { border-color:var(--pink); color:var(--pink); }

  .coach { position:fixed; right:24px; bottom:24px; width:330px; background:#fff; border-radius:18px;
           box-shadow:0 18px 50px rgba(28,22,29,.25); padding:18px; z-index:60; display:none; }
  .coach.show { display:block; }
  .coach .k { font-size:11.5px; font-weight:800; color:var(--pink); letter-spacing:.08em; }
  .coach b { display:block; font-size:15.5px; margin:6px 0 6px; }
  .coach p { font-size:13.5px; color:var(--muted); line-height:1.55; font-weight:600; }

  .drawer { position:fixed; top:0; right:-380px; width:380px; height:100%; background:#1c1f26; color:#dfe3e8;
            z-index:70; transition:right .25s; display:flex; flex-direction:column; }
  .drawer.open { right:0; }
  .drawer header { padding:14px 16px; font-weight:800; display:flex; justify-content:space-between;
                   align-items:center; border-bottom:1px solid #2c3038; font-size:14px; }
  .drawer header button { background:none; border:none; color:#8be0c9; cursor:pointer; font-weight:700; font-family:inherit; }
  #agent-log { flex:1; overflow-y:auto; padding:10px 14px; font-family:Consolas,monospace; font-size:11.5px; }
  .ev { border-left:3px solid #25d366; padding:5px 8px; margin:7px 0; background:#232730; border-radius:0 6px 6px 0; }
  .ev .agent { font-weight:700; color:#8be0c9; }
  .ev pre { white-space:pre-wrap; word-break:break-word; color:#9aa3ad; margin-top:3px; max-height:110px; overflow-y:auto; }
</style>
</head>
<body>
<div class="topbar">
  <a class="home" href="/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M15 19 8 12l7-7"/></svg>Home</a>
  <span class="sep">|</span>
  <span class="title">Karigar <span>· Live Demo — the artisan's journey</span></span>
  <div class="top-actions">
    <button class="pill pink" onclick="playDemo()">▶&nbsp; Play Demo</button>
    <button class="pill ghost" onclick="nextStep()">▷|&nbsp; Next</button>
  </div>
</div>

<div class="stage">
 <div class="phones">
  <div class="phone-wrap">
    <div class="phone"><span class="notch"></span>
      <div class="screen">
        <div class="statusbar wa"><span id="clock1">8:05</span>
          <span class="right">VoLTE <span id="batt1">22%</span><span class="batt"></span></span></div>
        <iframe id="chat" src="/console?embed=1" allow="microphone"></iframe>
      </div>
    </div>
    <div class="caption">The Artisan's Side <span>· WhatsApp</span></div>
  </div>

  <div class="phone-wrap">
    <div class="phone"><span class="notch"></span>
      <div class="screen">
        <div class="statusbar ms"><span id="clock2">8:06</span>
          <span class="right">VoLTE <span>21%</span><span class="batt"></span></span></div>
        <iframe id="meesho" src="/shop"></iframe>
      </div>
    </div>
    <div class="caption">The Buyer's Side <span>· Meesho, updates live</span></div>
  </div>
 </div>

 <div class="railcell">
  <div class="rail">
    <button class="step-btn primary" onclick="trigger('trigger-trend')"><span class="n">1 ·</span> Trigger Trend Msg</button>
    <button class="step-btn" onclick="trigger('trigger-payout')"><span class="n">2 ·</span> Trigger Payment</button>
    <button class="step-btn" onclick="newSession()"><span class="n">3 ·</span> New Artisan Session</button>
    <div class="minor">
      <button onclick="trigger('advance-week')">📅 Advance a week of sales</button>
      <button onclick="toggleDrawer()">🤖 Agent activity</button>
      <button onclick="resetDemo()" style="border-color:#e0b4b4;color:#b04a4a">🧹 Reset ALL demo data</button>
    </div>
  </div>
 </div>
</div>

<div class="coach" id="coach">
  <span class="k" id="coach-k">STEP 1 / 9</span>
  <b id="coach-title"></b>
  <p id="coach-body"></p>
</div>

<div class="drawer" id="drawer">
  <header>🤖 Live agent activity — raw model responses <button onclick="toggleDrawer()">close</button></header>
  <div id="agent-log"></div>
</div>

<script>
function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function session(){ return localStorage.getItem('karigar_session'); }
function newSession(){
  localStorage.removeItem('karigar_session');
  document.getElementById('chat').contentWindow.location.reload();
}
async function trigger(name){
  const fd = new FormData(); fd.append('session', session());
  const r = await fetch('/demo/'+name, {method:'POST', body:fd});
  if(!r.ok){ const e = await r.json(); alert(e.error||'failed'); }
}
async function resetDemo(){
  if(!confirm('Delete ALL listings, orders, artisans and chat history for a clean demo?')) return;
  await fetch('/demo/reset', {method:'POST'});
  localStorage.removeItem('karigar_session');
  localStorage.removeItem('karigar_orders');
  location.reload();
}

/* guided walkthrough */
const STEPS = [
 ['Start on WhatsApp', 'Tap "🙏 Naya Karigar" in the left phone. Choose a language — Hindi and English are live.'],
 ['Open her store account', 'Answer name and village by voice or text. Then KYC: try the GSTIN fast-path with 22AAAAA0000A1Z5, or send "no" and use PAN + passbook photos.'],
 ['Send her craft', 'Send 2-3 photos of ONE artwork. Vision checks quality, authenticity and provenance — watch the agent panel.'],
 ['The physical challenge', 'When asked, send a photo of the BACK of the painting. A print\'s back gets rejected with the reason.'],
 ['Approve the listing', 'Confirm the AI\'s price (or change it), then "हाँ, लिस्ट कर दो" — nothing publishes without her yes.'],
 ['Watch Meesho update', 'Her listing appears at the top of the Meesho phone within seconds, with the Verified Artisan badge.'],
 ['Buy it as a customer', 'Tap her listing on the Meesho phone → Buy Now. A Hindi voice note lands in her WhatsApp instantly.'],
 ['Return it', 'Meesho phone → My Orders → Return with a reason. The AI classifies it and de-escalates with her.'],
 ['Coach her', 'Use "Advance a week of sales", then "Trigger Trend Msg" — her weekly coaching voice note comes from real data.'],
];
let step = -1;
function playDemo(){ step = 0; showStep(); }
function nextStep(){ step = (step + 1) % STEPS.length; showStep(); }
function showStep(){
  const c = document.getElementById('coach');
  document.getElementById('coach-k').textContent = `STEP ${step+1} / ${STEPS.length}`;
  document.getElementById('coach-title').textContent = STEPS[step][0];
  document.getElementById('coach-body').textContent = STEPS[step][1];
  c.classList.add('show');
}

/* agent activity drawer */
let logSeen = 0;
function toggleDrawer(){ document.getElementById('drawer').classList.toggle('open'); }
async function poll(){
  try{
    const r = await fetch('/api/agent-log'); const d = await r.json();
    const el = document.getElementById('agent-log');
    d.events.slice(logSeen).forEach(ev=>{
      const div = document.createElement('div'); div.className = 'ev';
      div.innerHTML = '<span class="agent">'+esc(ev.agent)+'</span> '+esc(ev.summary)+
        (ev.payload?'<pre>'+esc(JSON.stringify(ev.payload,null,1).slice(0,700))+'</pre>':'');
      el.appendChild(div); el.scrollTop = el.scrollHeight;
    });
    logSeen = d.events.length;
  }catch(e){}
  setTimeout(poll, 1500);
}
poll();

/* live clocks */
function tick(){
  const now = new Date();
  const hm = now.getHours()%12 || 12;
  const t = hm + ':' + String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock1').textContent = t;
  document.getElementById('clock2').textContent = t;
}
tick(); setInterval(tick, 20000);
</script>
</body>
</html>
