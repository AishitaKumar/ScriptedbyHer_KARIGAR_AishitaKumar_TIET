<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Karigar · WhatsApp</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --teal:#075e54; --avatar:#0e8a72; --chat:#e5ddd5; --out:#d9fdd3; --ink:#111B21; }
  * { box-sizing:border-box; margin:0; font-family:'Manrope','Segoe UI',system-ui,sans-serif; }
  html, body { overflow:hidden; }
  body { height:100vh; height:100dvh; display:flex; flex-direction:column; background:var(--chat); position:relative; }

  .statusbar { background:var(--teal); color:rgba(255,255,255,.9); font-size:11px; font-weight:600;
               display:flex; justify-content:space-between; padding:8px 16px 0; flex:none; }
  .wa-header { background:var(--teal); color:#fff; padding:6px 10px 10px; display:flex;
               align-items:center; gap:9px; flex:none; }
  .wa-header svg { flex:none; }
  .avatar { width:36px; height:36px; flex:none; border-radius:50%; background:var(--avatar); color:#fff;
            display:grid; place-items:center; font-size:16px; font-weight:600; }
  .who { flex:1; min-width:0; line-height:1.2; }
  .who b { font-size:15px; font-weight:700; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .who small { font-size:11px; color:rgba(255,255,255,.7); display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .messages { flex:1; overflow-y:auto; overflow-x:hidden; padding:12px; scrollbar-width:none;
    background-color:var(--chat);
    background-image:radial-gradient(circle at 1px 1px, rgba(0,0,0,0.045) 1px, transparent 0);
    background-size:18px 18px; }
  .messages::-webkit-scrollbar { display:none; }
  .e2e { background:#fdf6cb; color:#525252; font-size:11px; font-weight:500; text-align:center;
         border-radius:6px; padding:8px 12px; margin:0 auto 12px; max-width:85%; line-height:1.45;
         box-shadow:0 1px 1px rgba(0,0,0,.06); }
  .e2e svg { vertical-align:-1.5px; margin-right:3px; }

  .msg { max-width:82%; margin:5px 0; padding:7px 10px 8px; border-radius:9px; font-size:13.5px;
         line-height:1.42; box-shadow:0 1px 1px rgba(0,0,0,.09); white-space:pre-wrap; color:var(--ink); }
  .msg.in { background:#fff; margin-right:auto; border-top-left-radius:2px; }
  .msg.out { background:var(--out); margin-left:auto; border-top-right-radius:2px; }
  .msg img { max-width:100%; border-radius:7px; margin-top:5px; display:block; }
  .msg audio { width:100%; max-width:100%; margin-top:6px; height:36px; }
  .msg.has-audio { width:262px; max-width:96%; }
  .btn-row { display:flex; flex-wrap:wrap; gap:6px; margin-top:9px; }
  .btn-row button { border:1.5px solid var(--teal); color:var(--teal); background:#fff;
                    border-radius:16px; padding:6px 13px; cursor:pointer; font-size:12.5px;
                    font-weight:700; font-family:inherit; }
  .btn-row button:hover { background:var(--teal); color:#fff; }

  .start-card { text-align:center; margin:46px auto 0; max-width:250px; background:#fff;
                border-radius:14px; padding:22px 18px; box-shadow:0 2px 10px rgba(0,0,0,.1); }
  .start-card .big { color:var(--avatar); display:flex; justify-content:center; }
  .start-card p { font-size:12.5px; color:#5a636a; margin:12px 0 15px; line-height:1.55; font-weight:600; }
  .start-card p .en { color:#98a1a8; }
  .start-card button { background:var(--avatar); border:none; color:#fff; font-weight:800; font-size:14px;
                       padding:11px 22px; border-radius:24px; cursor:pointer; font-family:inherit; }
  .start-card button:hover { background:var(--teal); }

  .composer { display:flex; gap:8px; padding:4px 8px 12px; align-items:center; background:var(--chat); flex:none; }
  .input-pill { flex:1; min-width:0; background:#fff; border-radius:999px; display:flex; align-items:center;
                gap:9px; padding:8px 12px; box-shadow:0 1px 1px rgba(0,0,0,.08); }
  .input-pill .smiley { font-size:18px; line-height:1; color:#a3a3a3; }
  .input-pill svg { color:#737373; flex:none; cursor:pointer; }
  .input-pill input { flex:1; border:none; outline:none; font-size:14px; font-family:inherit;
                      color:var(--ink); min-width:0; background:transparent; }
  .input-pill input::placeholder { color:#a3a3a3; }
  .fab { width:44px; height:44px; flex:none; border-radius:50%; border:none; background:var(--teal);
         color:#fff; cursor:pointer; display:grid; place-items:center; box-shadow:0 2px 6px rgba(0,0,0,.2); }
  .fab.rec { background:#EA4335; }
  .otp-popup { position:absolute; top:64px; left:50%; transform:translateX(-50%); z-index:40;
               width:82%; background:#fff; border-radius:12px; padding:14px 16px 12px;
               box-shadow:0 8px 28px rgba(0,0,0,.28); border:1px solid #e4e4e4; text-align:center; }
  .otp-popup .otp-x { position:absolute; top:6px; right:9px; border:none; background:none;
                      font-size:20px; line-height:1; color:#8a8a8a; cursor:pointer; }
  .otp-popup .otp-head { font-size:11px; font-weight:700; color:#8a8a8a; letter-spacing:.04em; }
  .otp-popup .otp-code { font-size:28px; font-weight:800; letter-spacing:6px; color:#111; margin:6px 0 8px; }
  .otp-popup audio { width:100%; height:34px; }
</style>
</head>
<body>
  <div class="statusbar"><span id="clock">8:05</span><span>VoLTE 22%</span></div>

  <div class="wa-header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m12 19-7-7 7-7M19 12H5"/></svg>
    <div class="avatar">क</div>
    <div class="who"><b>Karigar</b><small>AI seller assistant · online</small></div>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m16 13 5.2 3.1a.5.5 0 0 0 .8-.4V8.3a.5.5 0 0 0-.8-.4L16 11"/><rect x="2" y="6" width="14" height="12" rx="2"/></svg>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92Z"/></svg>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>
  </div>

  <div class="messages" id="messages">
    <div class="e2e"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Messages are end-to-end encrypted. No one outside of this chat can read them.</div>
    <div class="start-card" id="start-card">
      <div class="big">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
          <path d="M4 9.5 5.2 4h13.6L20 9.5M4 9.5a2.3 2.3 0 0 0 4.6 0 2.3 2.3 0 0 0 4.7 0 2.3 2.3 0 0 0 4.7 0 2.3 2.3 0 0 0 2 2.3V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-8.2a2.3 2.3 0 0 0 2-2.3Z"/>
          <path d="M9.5 21v-6h5v6"/>
        </svg>
      </div>
      <p>चैट शुरू करने के लिए 'Naya Karigar' दबाएं<br><span class="en">(tap the Naya Karigar button to start the chat)</span></p>
      <button onclick="startChat()">Naya Karigar</button>
    </div>
  </div>

  <div class="composer">
    <div class="input-pill">
      <span class="smiley">☺</span>
      <input type="text" id="text-input" placeholder="Message" autocomplete="off">
      <svg id="attach-btn" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      <svg id="img-btn" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3Z"/><circle cx="12" cy="13" r="3"/></svg>
      <input type="file" id="img-input" accept="image/*" multiple hidden>
    </div>
    <button class="fab" id="fab" title="Record voice note / send">
      <svg id="fab-mic" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2.5" width="6" height="11.5" rx="3"/><path d="M5.5 11a6.5 6.5 0 0 0 13 0M12 17.5V21M9 21h6"/></svg>
      <svg id="fab-send" width="19" height="19" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M3 20.5 22 12 3 3.5V10l13 2-13 2v6.5Z"/></svg>
    </button>
  </div>

<script>
const qs = new URLSearchParams(location.search);
// use the session id from the demo parent (?s=), or fall back to our own
let SESSION = qs.get('s') || sessionStorage.getItem('karigar_session') ||
  Math.random().toString(36).slice(2, 10);
sessionStorage.setItem('karigar_session', SESSION);

const messagesEl = document.getElementById('messages');
const textInput = document.getElementById('text-input');
let since = 0;

function tick(){ const n=new Date(); document.getElementById('clock').textContent=(n.getHours()%12||12)+':'+String(n.getMinutes()).padStart(2,'0'); }
tick(); setInterval(tick, 20000);

function removeStart(){ const c=document.getElementById('start-card'); if(c) c.remove(); }
function startChat(){ removeStart(); addBubble('Naya Karigar','out'); send('text','Naya Karigar'); }

function addBubble(html, dir){
  removeStart();
  const d=document.createElement('div'); d.className='msg '+dir; d.innerHTML=html;
  if(html.indexOf('<audio') >= 0) d.classList.add('has-audio');  // give the player room
  messagesEl.appendChild(d); messagesEl.scrollTop=messagesEl.scrollHeight; return d;
}
function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

async function send(type, text, file){
  const fd=new FormData();
  fd.append('session',SESSION); fd.append('type',type);
  if(text) fd.append('text',text);
  if(file) fd.append('file',file);
  await fetch('/api/console/send',{method:'POST',body:fd});
}

function updateFab(){
  const typing = textInput.value.trim().length > 0;
  document.getElementById('fab-mic').style.display = typing?'none':'block';
  document.getElementById('fab-send').style.display = typing?'block':'none';
}
textInput.addEventListener('input', updateFab);
textInput.addEventListener('keydown', e=>{ if(e.key==='Enter') sendText(); });
function sendText(){
  const v=textInput.value.trim(); if(!v) return;
  textInput.value=''; updateFab();
  addBubble(esc(v),'out'); send('text',v);
}

document.getElementById('img-btn').onclick = ()=>document.getElementById('img-input').click();
document.getElementById('attach-btn').onclick = ()=>document.getElementById('img-input').click();
document.getElementById('img-input').onchange = async e=>{
  for(const f of e.target.files){
    addBubble('<img src="'+URL.createObjectURL(f)+'">','out');
    await send('image',null,f);
  }
  e.target.value='';
};

let recorder=null, chunks=[];
document.getElementById('fab').onclick = async function(){
  if(textInput.value.trim()){ sendText(); return; }
  if(recorder && recorder.state==='recording'){ recorder.stop(); return; }
  const stream=await navigator.mediaDevices.getUserMedia({audio:true});
  chunks=[]; recorder=new MediaRecorder(stream,{mimeType:'audio/webm'});
  recorder.ondataavailable=e=>chunks.push(e.data);
  recorder.onstop=async ()=>{
    stream.getTracks().forEach(t=>t.stop());
    this.classList.remove('rec');
    const blob=new Blob(chunks,{type:'audio/webm'});
    const f=new File([blob],'note.webm',{type:'audio/webm'});
    addBubble('🎤 <audio controls src="'+URL.createObjectURL(blob)+'"></audio>','out');
    await send('audio',null,f);
  };
  recorder.start(); this.classList.add('rec');
};

function showOtpPopup(code, audioUrl){
  document.getElementById('otp-popup')?.remove();
  const p=document.createElement('div'); p.id='otp-popup'; p.className='otp-popup';
  p.innerHTML =
    '<button class="otp-x" aria-label="close">&times;</button>'+
    '<div class="otp-head">📩 SMS · OTP</div>'+
    '<div class="otp-code">'+esc(code)+'</div>'+
    (audioUrl?'<audio controls src="'+audioUrl+'"></audio>':'');
  p.querySelector('.otp-x').onclick=()=>p.remove();
  document.body.appendChild(p);
}

function renderInbound(m){
  if(m.meta && m.meta.otp_popup){   // dismissible OTP notification, not a chat bubble
    showOtpPopup(m.meta.otp_popup, m.audio_url);
    return;
  }
  let html=esc(m.text);
  if(m.image_url) html+='<img src="'+m.image_url+'">';
  if(m.audio_url) html+='<audio controls src="'+m.audio_url+'"></audio>';
  const bubble=addBubble(html,'in');
  if(m.buttons && m.buttons.length){
    const row=document.createElement('div'); row.className='btn-row';
    m.buttons.forEach(b=>{
      const btn=document.createElement('button'); btn.textContent=b.label;
      btn.onclick=()=>{ addBubble(esc(b.label),'out'); send('button',b.id); };
      row.appendChild(btn);
    });
    bubble.appendChild(row);
  }
}

async function poll(){
  try{
    const r=await fetch(`/api/console/poll?session=${SESSION}&since=${since}`);
    const data=await r.json();
    if(data.messages.length) removeStart();
    data.messages.forEach(renderInbound);
    since=data.next;
  }catch(e){}
  setTimeout(poll,1500);
}
poll();
</script>
</body>
</html>
