function ic(name, cls, opt){
  opt = opt || {};
  const stroke = opt.fill ? `fill="${opt.fill}" stroke="none"` : `fill="none" stroke="currentColor" stroke-width="${opt.sw||2}" stroke-linecap="round" stroke-linejoin="round"`;
  return `<svg class="${cls||'size-4'}" viewBox="0 0 24 24" ${stroke}>${PATHS[name]}</svg>`;
}

async function placeOrder(p){
  const btn = document.getElementById('continue');
  if(btn){ btn.disabled=true; btn.textContent='Placing…'; }
  let order = { order_id:null, live:!!p.live, name:p.name, image:p.image, price:p.price, mrp:p.mrp,
                rating:p.rating, reviews:p.reviews, verified:p.verified, desc:p.desc, artisanLine:p.artisanLine,
                status:'placed', reviewed:false };
  if(p.live){
    const fd=new FormData(); fd.append('listing_id', p.id);
    const r = await fetch('/demo/buy', {method:'POST', body:fd});
    if(r.ok){ order.order_id = (await r.json()).order_id; }
    else { toast('Could not place order'); if(btn){btn.disabled=false; btn.textContent='Confirm';} return; }
  } else if(p.craft){
    // base catalogue item with a real craft → feed marketplace demand for Trend
    const fd=new FormData(); fd.append('craft', p.craft);
    try { await fetch('/demo/market-buy', {method:'POST', body:fd}); } catch(e){}
  }
  orders.unshift(order); saveOrders();
  toast(p.live ? '📦 Order placed — the artisan just got a WhatsApp voice note' : '📦 Order placed');
  renderOrder(order);
}

async function submitReview(order, rating, comment){
  const btn = document.getElementById('submit-review');
  btn.disabled = true; btn.textContent = 'Submitting…';
  if(order.live && order.order_id){
    const fd = new FormData(); fd.append('order_id', order.order_id); fd.append('rating', rating); fd.append('comment', comment||'');
    try { await fetch('/demo/submit-review', {method:'POST', body:fd}); } catch(e){}
  }
  order.reviewed = true; saveOrders();
  document.getElementById('review-done').classList.remove('hidden');
  btn.textContent = 'Submit Review';
  toast(order.live ? '⭐ Review sent — the artisan has been notified' : '⭐ Review submitted');
}

async function submitAction(order, action, reason){
  const btn = document.getElementById('submit-action');
  btn.disabled = true; btn.textContent = 'Submitting…';
  if(order.live && order.order_id){
    const url = action==='return' ? '/demo/return-order' : '/demo/exchange-order';
    const fd = new FormData(); fd.append('order_id', order.order_id); fd.append('reason', reason);
    try { await fetch(url, {method:'POST', body:fd}); } catch(e){}
  }
  order.status = action==='return' ? 'returned' : 'exchanged'; saveOrders();
  const done = document.getElementById('action-done');
  done.textContent = `Your ${action} request has been submitted.`; done.classList.remove('hidden');
  toast(order.live
    ? (action==='return' ? '↩️ Return sent — de-escalation voice note to the artisan' : '🔁 Exchange sent — the artisan is notified')
    : `Your ${action} request has been submitted.`);
}

/* ---------- delivered signal from the demo rail (Trigger Payment) ---------- */
window.addEventListener('message', async (e)=>{
  if(!e.data || e.data.type !== 'deliver-next') return;
  // Deliver only the OLDEST still-undelivered order (orders[] is newest-first).
  let target = null;
  for(let i = orders.length - 1; i >= 0; i--){
    if(orders[i].status === 'placed'){ orders[i].status = 'delivered'; target = orders[i]; break; }
  }
  if(!target){ toast('No undelivered order — buy something first'); return; }
  saveOrders();
  if(view.name === 'order') renderOrder(view.order);
  else if(view.name === 'myorders') renderMyOrders();
  // Pay the artisan ONLY for a real listing — base products just show delivered.
  if(target.live && target.order_id){
    try {
      const fd = new FormData(); fd.append('order_id', target.order_id);
      await fetch('/demo/deliver-order', {method:'POST', body:fd});
      toast('✅ Delivered — payment voice note sent to the artisan');
    } catch(err){}
  } else {
    toast('✅ Order delivered');
  }
});

      price:l.price, mrp:l.original_price||l.price, offerPrice:Math.max(l.price-30,1),
      rating:'New', reviews:'Just listed', verified:true, desc:l.description, dimensions:l.dimensions,
      artisanLine:l.artisans?`by ${l.artisans.name||'artisan'}, ${l.artisans.village||''}`:'',
    }));
    if(view.name==='list') renderList();
  }catch(e){}
}
renderList();
loadLive(); setInterval(loadLive, 5000);
</script>
</body>
</html>
